- title: zen/do
  role: Co-founder, Developer
  description: |
    A physical distraction-free timer device built to help you stay focused on what matters.
    - Hardware device powered by ESP32 with a UI built using LVGL
    - Firmware written in C for minimal latency and low power consumption
    - Companion app (iOS, macOS, Android) built with Flutter, connecting to the device via BLE using a nanopb-based protocol
    - Multiple focus modes: Pomodoro, countdown timer, or open-ended time tracking
    - Organize work into focus projects with custom preferences
    - Companion dashboard with insights into how you spend your time
  screenshots:
    - content/zen-do.jpg
  tags:
    - esp32
    - c
    - lvgl
    - embedded
    - ble
    - nanopb
    - flutter
    - dart
    - ios
    - macos
    - android

