name: Flutter Web
on:
  push:
    branches:
      - master
jobs:
  build:
    name: Build Web
    env:
      my_secret: ${{secrets.commit_secret}}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: subosito/flutter-action@fd55f4c5af5b953cc57a2be44cb082c8f6635e8e # pin@v2
        with:
          flutter-version-file: pubspec.yaml
          cache: true
          architecture: x64
      - run: flutter pub get
      - run: flutter build web --wasm --release
      - run: |
          cd build/web
          git init
          git config --global user.email ezorrio@gmail.com
          git config --global user.name Emin Guliev
          git status
          git remote add origin https://${{secrets.commit_secret}}@github.com/ezorrio/ezorrio.github.io.git
          git checkout -b master
          echo ezorr.io > CNAME
          git add --all
          git commit -m "Update Build"
          git push origin master -f
